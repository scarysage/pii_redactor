# Local-only operation. Keep Streamlit from phoning home for ANY reason.
# Per CLAUDE.md: no outbound network calls at runtime. This config is part of
# that guarantee -- do not enable telemetry/usage stats/updates here.

[browser]
gatherUsageStats = false

[server]
# Bind only to localhost. The app must not be reachable from other machines.
address = "127.0.0.1"
headless = true
# Streamlit's CORS/XSRF protections are fine for local-only use.
enableCORS = true
enableXsrfProtection = true
# Cap upload size (MB). Real accounting documents are well under this -- even
# large scanned PDFs rarely exceed it -- while the cap still stops a single
# oversized or malformed file from exhausting memory in the document parsers
# (openpyxl / python-docx / pdfminer). Streamlit's default is 200.
maxUploadSize = 100

[global]
# Keep the runtime quiet. No "show warning when running in dev mode" noise.
showWarningOnDirectExecution = false

[theme]
# "Midnight" palette: near-black canvas, warm cream text, amber primary
# accent so CTA buttons read against the dark bg. The deep-red #C00000
# is RESERVED -- it only appears on redacted content in DOCX/XLSX
# outputs and the live preview, so it stays a meaningful signal rather
# than another piece of UI chrome.
#
# Setting base = "dark" gives Streamlit the right starting point for
# input fields, expanders, and other internal components so we only
# need to override the canvas + accent colors below.
base = "dark"
primaryColor = "#F59E0B"             # amber-500 (CTA buttons, focus rings)
backgroundColor = "#0F172A"          # slate-900 (main canvas)
secondaryBackgroundColor = "#1E293B" # slate-800 (panels, expanders)
textColor = "#F8FAFC"                # slate-50 (primary text)
# Use the system sans-serif stack -- bundled fonts only, no Google Fonts
# fetch (offline guarantee).
font = "sans serif"
