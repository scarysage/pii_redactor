# Local-only operation. Keep Streamlit from phoning home for ANY reason.
# Per CLAUDE.md: no outbound network calls at runtime. This config is part of
# that guarantee -- do not enable telemetry/usage stats/updates here.

[browser]
gatherUsageStats = false

[server]
# Bind only to localhost. The app must not be reachable from other machines.
address = "127.0.0.1"
headless = true
# Streamlit's CORS/XSRF protections are fine for local-only use.
enableCORS = true
enableXsrfProtection = true

[global]
# Keep the runtime quiet. No "show warning when running in dev mode" noise.
showWarningOnDirectExecution = false

[theme]
# "Quiet Professional" palette: calm navy for buttons/links, near-white
# canvas, subtle slate alt-bg for grouped panels. The deep-red #C00000
# is RESERVED -- it only appears on redacted content in DOCX/XLSX
# outputs and the live preview, so it stays a meaningful signal rather
# than another piece of UI chrome.
base = "light"
primaryColor = "#1E3A5F"             # navy (buttons, links, focus rings)
backgroundColor = "#FFFFFF"          # main canvas
secondaryBackgroundColor = "#F8FAFC" # subtle stripe for st.container panels
textColor = "#0F172A"                # slate-900
# Use the system sans-serif stack -- bundled fonts only, no Google Fonts
# fetch (offline guarantee).
font = "sans serif"
